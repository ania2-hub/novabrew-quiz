<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Bright Idealist</title>
  <desc id="desc">A sunny illustration for the Bright Idealist coffee personality.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFBEF"/>
      <stop offset="100%" stop-color="#F0CF69"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <circle cx="1020" cy="140" r="120" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="180" cy="620" r="170" fill="#C96A4D" opacity="0.08"/>
  <text x="90" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700" fill="#5A392A">Bright Idealist</text>
  <text x="90" y="205" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#7D5A49">Fresh, optimistic, and full of light.</text>
  <text x="90" y="435" font-family="Segoe UI Emoji, Segoe UI, Arial, sans-serif" font-size="220">🌼</text>
  <text x="350" y="410" font-family="Segoe UI, Arial, sans-serif" font-size="58" font-weight="700" fill="#5A392A">A brighter way to wake up</text>
  <text x="350" y="470" font-family="Segoe UI, Arial, sans-serif" font-size="28" fill="#7D5A49">Lively flavors, open windows, and optimism in a cup.</text>
</svg>
