<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Craft Purist</title>
  <desc id="desc">A meticulous illustration for the Craft Purist coffee personality.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9F3ED"/>
      <stop offset="100%" stop-color="#5D3A2C"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <circle cx="1040" cy="130" r="110" fill="#F6B96D" opacity="0.18"/>
  <circle cx="180" cy="610" r="170" fill="#FFFFFF" opacity="0.08"/>
  <text x="90" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700" fill="#FFF5EF">Craft Purist</text>
  <text x="90" y="205" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#F5DCCB">Intentional, thoughtful, and detail-rich.</text>
  <text x="90" y="435" font-family="Segoe UI Emoji, Segoe UI, Arial, sans-serif" font-size="220">🛠️</text>
  <text x="350" y="410" font-family="Segoe UI, Arial, sans-serif" font-size="58" font-weight="700" fill="#FFF7EF">You care how it was made</text>
  <text x="350" y="470" font-family="Segoe UI, Arial, sans-serif" font-size="28" fill="#F5DCCB">Story, craftsmanship, and precision all matter here.</text>
</svg>
