<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">NovaBrew Playful Color Palette</title>
  <desc id="desc">A warm, playful color palette preview for the NovaBrew Coffee Taste Profile Quiz.</desc>
  <rect width="1200" height="720" fill="#FFF7EF"/>
  <circle cx="150" cy="120" r="120" fill="#FFD5B8" opacity="0.75"/>
  <circle cx="1080" cy="110" r="90" fill="#F6B96D" opacity="0.55"/>
  <circle cx="1050" cy="620" r="140" fill="#7C3F54" opacity="0.12"/>

  <text x="90" y="110" font-family="Segoe UI, Arial, sans-serif" font-size="48" font-weight="700" fill="#4A2E22">
    Playful Palette
  </text>
  <text x="90" y="155" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#7D5A49">
    Warm, inviting, shareable, and still polished enough to feel premium.
  </text>

  <g transform="translate(90 220)">
    <rect x="0" y="0" width="160" height="160" rx="28" fill="#FFF7EF" stroke="#EEDBCB" stroke-width="4"/>
    <text x="20" y="206" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#4A2E22">Cream</text>
    <text x="20" y="238" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#7D5A49">#FFF7EF</text>
  </g>

  <g transform="translate(290 220)">
    <rect x="0" y="0" width="160" height="160" rx="28" fill="#FFD5B8"/>
    <text x="20" y="206" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#4A2E22">Peach</text>
    <text x="20" y="238" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#7D5A49">#FFD5B8</text>
  </g>

  <g transform="translate(490 220)">
    <rect x="0" y="0" width="160" height="160" rx="28" fill="#F6B96D"/>
    <text x="20" y="206" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#4A2E22">Golden</text>
    <text x="20" y="238" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#7D5A49">#F6B96D</text>
  </g>

  <g transform="translate(690 220)">
    <rect x="0" y="0" width="160" height="160" rx="28" fill="#C96A4D"/>
    <text x="20" y="206" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#4A2E22">Terracotta</text>
    <text x="20" y="238" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#7D5A49">#C96A4D</text>
  </g>

  <g transform="translate(890 220)">
    <rect x="0" y="0" width="160" height="160" rx="28" fill="#7C3F54"/>
    <text x="20" y="206" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#4A2E22">Berry</text>
    <text x="20" y="238" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#7D5A49">#7C3F54</text>
  </g>

  <rect x="90" y="470" width="1020" height="140" rx="32" fill="#FFFDF9" stroke="#E8CDB9" stroke-width="3"/>
  <text x="130" y="528" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#4A2E22">
    Suggested UI use
  </text>
  <text x="130" y="572" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#7D5A49">
    Cream background • Peach cards • Golden highlights • Terracotta buttons • Berry accent moments • Espresso text
  </text>
  <text x="130" y="605" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#7D5A49">
    Result images: yes
  </text>
</svg>
